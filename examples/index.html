<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <div id="app">
      <button @click="signUp">SignUp</button>

      <button @click="refresh">Refresh</button>

      <button @click="login">Login</button>

      <button @click="getUser">Get User</button>

      <button @click="signOut">Sign Out</button>
      <button @click="addRandomCountry">Add Country</button>

      <h2>User</h2>
      <p v-text="JSON.stringify(user)" />

      <h2>SSE</h2>
      <p v-for="data in sseData" v-text="data" />
    </div>

    <script>
      const { createApp, ref } = Vue;

      const axiosInstance = axios.create({
        baseURL: "http://localhost:3000",
        withCredentials: true,
        headers: {
          "Content-Type": "application/json",
        },
      });

      createApp({
        setup() {
          const user = ref(null);
          const sseData = ref([]);

          const attachSSE = () => {
            const eventSource = new EventSource(`http://localhost:3000/sse`, {
              withCredentials: true,
            });

            eventSource.addEventListener("connected", (event) => {
              console.log("Connected:", event.data);
            });

            eventSource.onmessage = (event) => {
              console.log("Received message:", event.data);
              sseData.value.push(event.data);
            };

            eventSource.onerror = (error) => {
              eventSource.close();
            };
          };

          const signUp = async () => {
            const { data } = await axiosInstance.post("/auth/sign-up", {
              email: "test@test.com",
              password: "12345678",
            });
          };

          const refresh = async () => {
            await axiosInstance.get("/auth/refresh");

            await getUser();
          };

          const login = async () => {
            const { data } = await axiosInstance.post("/auth/sign-in", {
              email: "test@test.com",
              password: "12345678",
            });

            if (data.token) localStorage.setItem("token", data.token);

            await getUser();
            attachSSE();
          };

          const getUser = async () => {
            const { data } = await axiosInstance.get("/auth/me", {
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${localStorage.getItem("token")}`,
              },
            });

            user.value = data;
          };

          const signOut = async () => {
            await axiosInstance.post("/auth/sign-out");

            localStorage.removeItem("token");

            user.value = null;
          };

          const addRandomCountry = async () => {
            const countries = [
              "USA",
              "UK",
              "Germany",
              "France",
              "Italy",
              "Spain",
            ];
            await axiosInstance.post("/countries", {
              name: countries[Math.floor(Math.random() * countries.length)],
            });
          };

          return {
            user,
            signUp,
            login,
            getUser,
            signOut,
            refresh,
            addRandomCountry,
            sseData,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
